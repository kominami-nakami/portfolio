<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />

    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>

    <header class="hero container">

        <a class="cta" href="index.html#gallery">トップへ戻る</a>

          <div class="slide-main-wrap">
            <button class="slide-nav prev" type="button" aria-label="前の写真">‹</button>
            <img
              class="slide-main zoomable"
              src="works/EVENTSNAP/STRIDE_20260307/20260307_STRIDE-4.webp"

              decoding="async"
            />

          </div>
          <div class="slide-thumbs" aria-label="サムネイル一覧">
