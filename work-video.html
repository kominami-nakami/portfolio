<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Works | こみなみなかみ</title>
    <meta
      name="description"
      content="動画撮影の作例一覧ページ。トップは代表作例のみ、その他の案件はこのページで掲載します。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <header class="hero container">
      <nav class="topnav">
        <p class="logo">VIDEO WORKS</p>
        <a class="cta" href="index.html#gallery">トップへ戻る</a>
      </nav>
      <p class="eyebrow">Category Page</p>
      <h1>Video Works</h1>
      <p class="lead">動画撮影の案件一覧ページです。イベント告知、PR、MVの案件をこのページで整理します。</p>
    </header>

    <main class="container">
      <section class="section reveal">
        <div class="section-head">
          <p class="kicker">Featured</p>
          <h2>代表作例</h2>
        </div>
        <article class="card">
          <h3>動画撮影サンプル案件</h3>
          <p class="notice">現在公開可能な代表作例を準備中です。追加時は works/VIDEO/案件名_日付 配下へ格納してください。</p>
        </article>
      </section>

      <section class="section reveal">
        <div class="section-head">
          <p class="kicker">All Cases</p>
          <h2>その他の案件</h2>
        </div>
        <p class="notice">このページで案件を一覧化していきます。</p>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <small>© 2026 kominami-nakami</small>
      </div>
    </footer>

    <script src="site.js"></script>
  </body>
</html>
